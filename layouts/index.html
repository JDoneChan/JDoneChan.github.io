{{ define "main" }}
<section class="hero container">
  <p class="eyebrow">PERSONAL NOTES / 2026</p>
  <h1>{{ .Title }}</h1>
  <div class="hero-copy">{{ .Content }}</div>
  <a class="text-link" href="{{ "posts/" | relURL }}">浏览全部文章 <span>→</span></a>
</section>
<section class="posts-section container">
  <div class="section-heading"><h2>最新文章</h2><span>{{ len (where site.RegularPages "Type" "posts") }} 篇记录</span></div>
  <div class="post-grid">
    {{ range first 6 (where site.RegularPages "Type" "posts") }}{{ partial "post-card.html" . }}{{ end }}
  </div>
</section>
{{ end }}
