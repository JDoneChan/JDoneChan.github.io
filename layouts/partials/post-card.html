<article class="post-card">
  <div class="post-meta"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006 / 01 / 02" }}</time>{{ with .Params.categories }}<span>{{ index . 0 }}</span>{{ end }}</div>
  <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  <p>{{ .Summary }}</p>
  <a class="card-link" href="{{ .RelPermalink }}">阅读文章 <span>↗</span></a>
</article>
